components:
  parameters:
    PageParam:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    SortOrderParam:
      in: query
      name: sortOrder
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    StripeSignatureHeader:
      in: header
      name: stripe-signature
      required: true
      schema:
        type: string
      description: Stripe webhook signature header used for event verification.

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken

  schemas:
    Role:
      type: string
      enum: [USER, VENDOR, EMPLOYEE, ADMIN]

    BookingStatus:
      type: string
      enum: [PENDING, ACCEPTED, IN_PROGRESS, COMPLETED, REJECTED, CANCELLED]

    PaymentStatus:
      type: string
      enum: [PENDING, SUCCESSFUL, FAILED]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: michael.carter@brightfix.com
        password:
          type: string
          example: strongPassword123

    RegisterUserRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Michael Carter
        email:
          type: string
          format: email
          example: michael.carter@example.com
        password:
          type: string
          minLength: 8
          example: strongPassword123

    RegisterVendorRequest:
      allOf:
        - $ref: "#/components/schemas/RegisterUserRequest"
        - type: object
          required: [vendorName, phone, description, address]
          properties:
            vendorName:
              type: string
              example: BrightFix Home Services Co. LTD
            logo:
              type: string
              format: uri
              example: https://example.com/logo.png
            phone:
              type: string
              example: "+1-555-210-7788"
            description:
              type: string
              example: Reliable plumbing, electrical and home maintenance services.
            address:
              type: string
              example: 2457 Green Valley Ave, Dallas, TX 75201

    CreateEmployeeRequest:
      allOf:
        - $ref: "#/components/schemas/RegisterUserRequest"
        - type: object
          required: [serviceCategoryId, profilePhoto, bio, address, phone, hourlyRate, experienceYears]
          properties:
            serviceCategoryId:
              type: string
              format: uuid
            profilePhoto:
              type: string
              format: uri
              example: https://example.com/employee-photo.jpg
            bio:
              type: string
              example: Experienced electrician and appliance technician.
            address:
              type: string
              example: 101 Maple Street, Dallas, TX 75202
            phone:
              type: string
              example: "+1-555-444-1234"
            hourlyRate:
              type: number
              example: 30
            experienceYears:
              type: integer
              minimum: 0
              example: 5

    UserBasic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/Role"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VendorProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        vendorName:
          type: string
        logo:
          type: string
          nullable: true
        phone:
          type: string
        description:
          type: string
        address:
          type: string
        isApproved:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EmployeeProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        serviceCategoryId:
          type: string
          format: uuid
        profilePhoto:
          type: string
        bio:
          type: string
        address:
          type: string
        phone:
          type: string
        hourlyRate:
          type: number
        experienceYears:
          type: integer
        isActive:
          type: boolean
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorSource:
      type: object
      properties:
        path:
          type: string
          example: email
        message:
          type: string
          example: Email must be valid

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation Error
        errorSources:
          type: array
          items:
            $ref: "#/components/schemas/ErrorSource"

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 5

    StandardSuccess:
      type: object
      properties:
        statusCode:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation successful
        data:
          type: object
          additionalProperties: true
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    RegisterUserSuccessResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 201
        success:
          type: boolean
          example: true
        message:
          type: string
          example: User registered successfully
        data:
          $ref: "#/components/schemas/UserBasic"

    RegisterVendorResponseData:
      allOf:
        - $ref: "#/components/schemas/UserBasic"
        - type: object
          properties:
            vendorProfile:
              $ref: "#/components/schemas/VendorProfile"

    RegisterVendorSuccessResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 201
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Vendor registered successfully
        data:
          $ref: "#/components/schemas/RegisterVendorResponseData"

    CreateEmployeeResponseData:
      allOf:
        - $ref: "#/components/schemas/UserBasic"
        - type: object
          properties:
            employeeProfile:
              $ref: "#/components/schemas/EmployeeProfile"

    CreateEmployeeSuccessResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 201
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Employee created successfully
        data:
          $ref: "#/components/schemas/CreateEmployeeResponseData"

    LoginSuccessResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        message:
          type: string
          example: User logged in successfully
        data:
          $ref: "#/components/schemas/UserBasic"

    LogoutSuccessResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        message:
          type: string
          example: User logged out successfully
        data:
          nullable: true
          example: null

    GetMeResponseData:
      allOf:
        - $ref: "#/components/schemas/UserBasic"
        - type: object
          properties:
            profile:
              type: object
              nullable: true
              additionalProperties: true

    GetMeSuccessResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        message:
          type: string
          example: User retrieved successfully
        data:
          $ref: "#/components/schemas/GetMeResponseData"

    CheckoutSessionData:
      type: object
      properties:
        checkoutUrl:
          type: string
          format: uri
          example: https://checkout.stripe.com/c/pay/cs_test_...
        sessionId:
          type: string
          example: cs_test_a1b2c3
        payment:
          $ref: "#/components/schemas/PaymentEntity"

    CheckoutSessionSuccess:
      type: object
      properties:
        statusCode:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Checkout session created successfully
        data:
          $ref: "#/components/schemas/CheckoutSessionData"

    CreateBookingRequest:
      type: object
      required: [employeeId, startTime, endTime, serviceAddress]
      properties:
        employeeId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
          description: ISO datetime with timezone offset.
          example: 2026-03-25T10:00:00+08:00
        endTime:
          type: string
          format: date-time
          description: ISO datetime with timezone offset.
          example: 2026-03-25T12:00:00+08:00
        serviceAddress:
          type: string
          example: 88 Westwood Ave, Dallas, TX 75206
        note:
          type: string
          nullable: true
          example: Please bring basic tool kit.

    UpdateBookingStatusByVendorRequest:
      type: object
      required: [bookingStatus]
      properties:
        bookingStatus:
          type: string
          enum: [ACCEPTED, REJECTED, IN_PROGRESS, COMPLETED, CANCELLED]

    UpdateBookingStatusByEmployeeRequest:
      type: object
      required: [bookingStatus]
      properties:
        bookingStatus:
          type: string
          enum: [IN_PROGRESS, COMPLETED]

    BookingEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
