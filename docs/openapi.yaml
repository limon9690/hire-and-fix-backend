openapi: 3.0.3
info:
  title: Hire & Fix API
  version: 1.0.0
  description: |
    REST API for Hire & Fix backend.
    Base path is `/api/v1`.

servers:
  - url: http://localhost:5000
    description: Local development

tags:
  - name: Health
  - name: Auth
  - name: Payments
  - name: Bookings
  - name: Vendors
  - name: Employees
  - name: Service Categories
  - name: Reviews
  - name: Admin

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns a simple server health message.
      responses:
        "200":
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: Server is running!

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Authenticates a user and sets HTTP-only auth cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: HTTP-only auth cookie containing access token.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/register-user:
    post:
      tags: [Auth]
      summary: Register user
      description: Creates a customer user account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterUserSuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/register-vendor:
    post:
      tags: [Auth]
      summary: Register vendor
      description: Creates a vendor user account and vendor profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterVendorRequest"
      responses:
        "201":
          description: Vendor registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterVendorSuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email or vendor name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/create-employee:
    post:
      tags: [Auth]
      summary: Create employee (vendor)
      description: Creates an employee account under the authenticated vendor.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEmployeeSuccessResponse"
        "400":
          description: Validation/domain error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (role not vendor)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vendor profile or service category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Clears auth cookie for authenticated user.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User logged out
          headers:
            Set-Cookie:
              description: Cleared auth cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      description: Returns current authenticated user with role-specific profile.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMeSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/payments/checkout-session/{bookingId}:
    post:
      tags: [Payments]
      summary: Create Stripe checkout session
      description: Creates a Stripe Checkout Session for the authenticated user and booking (USER role).
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionSuccess"
        "400":
          description: Invalid booking/payment state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/payments/webhook:
    post:
      tags: [Payments]
      summary: Stripe webhook
      description: Receives Stripe webhook events and finalizes payment state.
      parameters:
        - $ref: "#/components/parameters/StripeSignatureHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        "400":
          description: Signature/payload error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings:
    post:
      tags: [Bookings]
      summary: Create booking
      description: Creates a new booking for authenticated user.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingSingleSuccessResponse"
        "400":
          description: Validation/domain error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Employee not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Booking time conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/me:
    get:
      tags: [Bookings]
      summary: Get my bookings
      description: Returns bookings for current user/vendor/employee based on role.
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SortOrderParam"
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, startTime, endTime, bookingStatus, paymentStatus, totalPrice]
        - in: query
          name: bookingStatus
          schema:
            $ref: "#/components/schemas/BookingStatus"
        - in: query
          name: paymentStatus
          schema:
            $ref: "#/components/schemas/PaymentStatus"
      responses:
        "200":
          description: Bookings retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingListSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Related profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/{id}:
    get:
      tags: [Bookings]
      summary: Get booking details
      description: Returns booking details if requester is authorized by role/ownership.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Booking retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingSingleSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking or profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/{id}/cancel:
    patch:
      tags: [Bookings]
      summary: Cancel booking (user)
      description: User can cancel own booking before service start and if not in final non-cancellable state.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingSingleSuccessResponse"
        "400":
          description: Invalid cancellation state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/{id}/status:
    patch:
      tags: [Bookings]
      summary: Update booking status by vendor
      description: Vendor updates status for own booking, with transition rules.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingStatusByVendorRequest"
      responses:
        "200":
          description: Booking status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingSingleSuccessResponse"
        "400":
          description: Invalid transition/state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking or vendor profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/bookings/{id}/employee-status:
    patch:
      tags: [Bookings]
      summary: Update booking status by employee
      description: Employee updates status for assigned booking with restricted transitions.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingStatusByEmployeeRequest"
      responses:
        "200":
          description: Booking status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingSingleSuccessResponse"
        "400":
          description: Invalid transition/state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking or employee profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/dashboard-summary:
    get:
      tags: [Admin]
      summary: Get platform dashboard summary
      description: Returns platform-level aggregate metrics (admin only).
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Dashboard summary retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardSummarySuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/users:
    get:
      tags: [Admin]
      summary: Get all users
      description: Returns paginated users list (admin only).
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SortOrderParam"
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [name, email, createdAt, updatedAt]
      responses:
        "200":
          description: Users retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/users/{id}:
    get:
      tags: [Admin]
      summary: Get single user
      description: Returns basic user with role-specific profile (admin only).
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetailsSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/users/{id}/status:
    patch:
      tags: [Admin]
      summary: Update user active status
      description: Updates profile `isActive` for user/vendor/employee (admin only).
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusRequest"
      responses:
        "200":
          description: User status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetailsSuccessResponse"
        "400":
          description: Invalid update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/vendors/{id}/approval:
    patch:
      tags: [Admin]
      summary: Update vendor approval status
      description: Approves or rejects vendor profile by id (admin only).
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorApprovalRequest"
      responses:
        "200":
          description: Vendor approval updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminVendorApprovalSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/bookings:
    get:
      tags: [Admin]
      summary: Get all bookings
      description: Returns paginated bookings with optional status filters (admin only).
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SortOrderParam"
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, startTime, endTime, bookingStatus, paymentStatus, totalPrice]
        - in: query
          name: bookingStatus
          schema:
            $ref: "#/components/schemas/BookingStatus"
        - in: query
          name: paymentStatus
          schema:
            $ref: "#/components/schemas/PaymentStatus"
      responses:
        "200":
          description: Bookings retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingListSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/bookings/{id}:
    get:
      tags: [Admin]
      summary: Get booking details
      description: Returns booking details by id (admin only).
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Booking retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingSingleSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/payments:
    get:
      tags: [Admin]
      summary: Get all payments
      description: Returns paginated payments with optional status filter (admin only).
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SortOrderParam"
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, updatedAt, status, amount, paidAt]
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/PaymentStatus"
      responses:
        "200":
          description: Payments retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPaymentListSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/payments/{id}:
    get:
      tags: [Admin]
      summary: Get payment details
      description: Returns payment details by id (admin only).
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPaymentSingleSuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/vendors:
    get:
      tags: [Vendors]
      summary: Get all vendors
      description: Returns paginated vendors with optional filters.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SortOrderParam"
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [vendorName, isApproved, isActive]
        - in: query
          name: isApproved
          schema:
            type: boolean
        - in: query
          name: isActive
          schema:
            type: boolean
        - in: query
          name: vendorName
          schema:
            type: string
      responses:
        "200":
          description: Vendors retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorListSuccessResponse"

  /api/v1/vendors/{id}:
    get:
      tags: [Vendors]
      summary: Get vendor details
      description: Returns approved/active vendor details with review summary.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Vendor retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorDetailsSuccessResponse"
        "404":
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/vendors/me:
    patch:
      tags: [Vendors]
      summary: Update my vendor profile
      description: Updates vendor profile and optional linked user basic fields (vendor only).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyVendorRequest"
      responses:
        "200":
          description: Vendor profile updated
          content:
            application/json:
